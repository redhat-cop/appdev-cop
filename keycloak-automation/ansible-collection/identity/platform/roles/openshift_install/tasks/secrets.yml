---
- name: Create Keycloak admin secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ openshift_install_app_name }}-admin"
        namespace: "{{ openshift_install_namespace }}"
        labels:
          app.kubernetes.io/component: keycloak
          app.kubernetes.io/part-of: identity-platform
      type: Opaque
      stringData:
        KEYCLOAK_ADMIN: "{{ openshift_install_admin_user }}"
        KEYCLOAK_ADMIN_PASSWORD: "{{ openshift_install_admin_password }}"

- name: Create Keycloak database connection secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ openshift_install_app_name }}-db"
        namespace: "{{ openshift_install_namespace }}"
        labels:
          app.kubernetes.io/component: keycloak
      type: Opaque
      stringData:
        KC_DB: postgres
        KC_DB_URL_HOST: "{{ openshift_install_db_host }}"
        KC_DB_URL_PORT: "{{ openshift_install_db_port | string }}"
        KC_DB_URL_DATABASE: "{{ openshift_install_db_name }}"
        KC_DB_USERNAME: "{{ openshift_install_db_user }}"
        KC_DB_PASSWORD: "{{ openshift_install_db_password }}"
