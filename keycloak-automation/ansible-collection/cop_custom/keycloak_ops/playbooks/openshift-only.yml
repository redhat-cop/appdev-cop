---
# ╔══════════════════════════════════════════════════════════════════╗
# ║  cop_custom.keycloak_ops — OpenShift Only                             ║
# ║                                                                 ║
# ║  Deploys Keycloak infrastructure on OpenShift without           ║
# ║  configuring realms, clients, or users.                         ║
# ╚══════════════════════════════════════════════════════════════════╝
- name: Deploy Keycloak infrastructure on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    keycloak_platform: openshift

    identity_platform:
      openshift:
        namespace: keycloak
      keycloak:
        admin_user: admin
        admin_password: changeme

  tasks:
    - name: Set up authentication
      ansible.builtin.include_role:
        name: cop_custom.keycloak_ops.auth
      vars:
        auth_setup_keycloak: false

    - name: Provision namespace
      ansible.builtin.include_role:
        name: cop_custom.keycloak_ops.openshift_rbac
      vars:
        openshift_rbac_namespaces:
          - name: "{{ identity_platform.openshift.namespace }}"
            display_name: Keycloak Ops — Keycloak

    - name: Install Keycloak on OpenShift
      ansible.builtin.include_role:
        name: cop_custom.keycloak_ops.keycloak_install
      vars:
        keycloak_install_namespace: "{{ identity_platform.openshift.namespace }}"
        keycloak_install_admin_user: "{{ identity_platform.keycloak.admin_user }}"
        keycloak_install_admin_password: "{{ identity_platform.keycloak.admin_password }}"
